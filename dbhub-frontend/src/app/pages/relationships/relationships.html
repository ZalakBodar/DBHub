<div class="relationship-container">

  <div class="header">

    <h1>Database Relationships</h1>

    <button
      class="refresh-btn"
      (click)="loadRelationships()">
      Refresh
    </button>

  </div>

  <div class="summary-card">

    <h3>Total Relationships</h3>

    <p>{{ relationships.length }}</p>

  </div>

  <p class="loading" *ngIf="loading">
    Loading relationships...
  </p>

  <p class="empty" *ngIf="!loading && relationships.length === 0">
    No relationships found.
  </p>

  <div
    class="table-wrapper"
    *ngIf="!loading && relationships.length > 0">

    <table>

      <thead>

        <tr>
          <th>#</th>
          <th>Parent Table</th>
          <th>Parent Column</th>
          <th>Child Table</th>
          <th>Child Column</th>
        </tr>

      </thead>

      <tbody>

        <tr
          *ngFor="let rel of relationships; let i = index">

          <td>{{ i + 1 }}</td>

          <td>{{ rel.parent_table }}</td>

          <td>{{ rel.parent_column }}</td>

          <td>{{ rel.child_table }}</td>

          <td>{{ rel.child_column }}</td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
