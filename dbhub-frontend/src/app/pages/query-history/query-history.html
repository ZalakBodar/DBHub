<div class="history-container">

  <h1>Query History</h1>

  <table *ngIf="history.length > 0">

    <thead>
      <tr>
        <th>ID</th>
        <th>Question</th>
        <th>SQL Query</th>
      </tr>
    </thead>

    <tbody>

      <tr *ngFor="let item of history">

        <td>{{ item.Id }}</td>

        <td>{{ item.Question }}</td>

        <td>
          <pre>{{ item.SQLQuery }}</pre>
        </td>

      </tr>

    </tbody>

  </table>

  <p *ngIf="history.length === 0">
    No query history found.
  </p>

</div>
