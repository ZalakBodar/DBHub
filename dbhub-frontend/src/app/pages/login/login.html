<div class="login-wrapper">

  <div class="login-card">

    <h1>DBHub</h1>

    <p class="subtitle">
     AI  Data Viewer
    </p>

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="email">

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password">

    <button (click)="login()">
      Login
    </button>

  </div>

</div>
